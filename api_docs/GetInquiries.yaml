openapi: 3.0.3
info:
  title: Hospitable Public API
  version: "2.0"
  description: Retrieve a list of inquiries for specified properties.
servers:
  - url: https://public.api.hospitable.com/v2
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ##— Response envelope -----------------------------------------------------
    InquiryListResponse:
      type: object
      properties:
        data:
          type: array
          items: $ref: '#/components/schemas/Inquiry'
        links: $ref: '#/components/schemas/PaginationLinks'
        meta: $ref: '#/components/schemas/PaginationMeta'

    ##— Core objects ----------------------------------------------------------
    Inquiry:
      type: object
      required: [id, platform, inquiry_date, guests, guest]
      properties:
        id:
          type: string
          format: uuid
          description: This is the conversation_id.
          example: 6f58fd0a-a9cb-3746-9219-384a156ff7bb
        platform:
          type: string
          example: homeaway
        inquiry_date:
          type: string
          format: date-time
          example: 2019-01-01T12:00:00Z
        arrival_date:
          type: string
          format: date-time
          nullable: true
          example: 2019-01-03T00:00:00-05:00
        departure_date:
          type: string
          format: date-time
          nullable: true
          example: 2019-01-05T00:00:00-05:00
        guests:
          type: object
          properties:
            total: { type: integer, example: 0 }
            adult_count: { type: integer, example: 0 }
            child_count: { type: integer, example: 0 }
            infant_count: { type: integer, example: 0 }
            pet_count: { type: integer, example: 0 }
        guest:
          type: object
          properties:
            first_name: { type: string, example: Beulah }
            last_name: { type: string, example: Hane }
        properties:
          $ref: '#/components/schemas/Property'
        listings:
          type: array
          items:
            type: object
            properties:
              platform: { type: string, example: airbnb }
              platform_id: { type: string, example: "24488" }
              platform_name: { type: string }
              platform_email: { type: string }
        user:
          type: object
          nullable: true
          properties:
            id: { type: string, format: uuid }
            email: { type: string, format: email }
            name: { type: string }

    Property:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        public_name: { type: string }
        picture: { type: string, format: uri }
        address:
          type: object
          properties:
            number: { type: string }
            street: { type: string }
            city: { type: string }
            state: { type: string }
            country: { type: string }
            postcode: { type: string }
            coordinates:
              type: object
              properties:
                latitude: { type: number }
                longitude: { type: number }
            display: { type: string }
        timezone: { type: string }
        listed: { type: boolean }
        amenities:
          type: array
          items: { type: string }
        description: { type: string }
        summary: { type: string }
        check-in: { type: string }
        check-out: { type: string }
        currency: { type: string }
        capacity:
          type: object
          properties:
            max: { type: integer }
            bedrooms: { type: integer }
            beds: { type: integer }
            bathrooms: { type: number }
        room_details:
          type: array
          items:
            type: object
            properties:
              type: { type: string }
              quantity: { type: integer }
        house_rules:
          type: object
          properties:
            pets_allowed: { type: boolean }
            smoking_allowed: { type: boolean }
            events_allowed: { type: boolean, nullable: true }

    PaginationLinks:
      type: object
      properties:
        first: { type: string, format: uri }
        last: { type: string, format: uri }
        prev: { type: string, format: uri, nullable: true }
        next: { type: string, format: uri, nullable: true }

    PaginationMeta:
      type: object
      properties:
        current_page: { type: integer }
        from: { type: integer }
        last_page: { type: integer }
        path: { type: string, format: uri }
        per_page: { type: integer }
        to: { type: integer }
        total: { type: integer }

    Error:
      type: object
      required: [message]
      properties:
        message: { type: string }

paths:
  /inquiries:
    get:
      summary: Get Inquiries
      description: Returns a list of inquiries. Requires property UUIDs.
      tags: [Inquiries]
      security:
        - bearerAuth: []
      parameters:
        - name: properties[]
          in: query
          required: true
          description: Array of property UUIDs to query for.
          schema:
            type: array
            items:
              type: string
        - name: include
          in: query
          description: Comma-separated values, any of financials, guest, properties, listings.
          schema:
            type: string
        - name: last_message_at
          in: query
          description: Find inquiries where the last message is after the specified datetime.
          schema:
            type: string
        - name: page
          in: query
          description: The page number you would like to retrieve.
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          description: The number of results to include per page.
          schema:
            type: integer
            default: 10
            maximum: 100
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: $ref: '#/components/schemas/InquiryListResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema: $ref: '#/components/schemas/Error'
